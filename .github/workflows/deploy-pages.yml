  ai-bug-analysis:
    runs-on: ubuntu-latest
    needs:
      - deterministic-playwright-e2e
      # - agentic-playwright-cli-exploration
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download deterministic E2E artifacts
        uses: actions/download-artifact@v5
        with:
          name: deterministic-playwright-e2e
          path: test-results/deterministic-playwright-e2e

      # - name: Download agentic exploration artifact
      #   uses: actions/download-artifact@v5
      #   with:
      #     name: agentic-playwright-cli-exploration
      #     path: test-results/agentic-playwright-cli-exploration

      - name: Prepare test results folder
        run: mkdir -p test-results

      - name: Skip AI bug analysis when OPENAI_API_KEY is unavailable
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: |
          mkdir -p test-results
          cat > test-results/ai-bug-analysis.md <<'EOF'
          # AI Bug Analysis + Test Suggestions

          Skipped because the `OPENAI_API_KEY` repository secret is not configured.
          EOF

      - name: AI bug analysis and test suggestions
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/ai-bug-analysis.md
          output-file: test-results/ai-bug-analysis.md
          sandbox: read-only

      - name: Add AI bug analysis to job summary
        if: always()
        run: cat test-results/ai-bug-analysis.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AI bug analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-bug-analysis-and-test-suggestions
          path: test-results/
          if-no-files-found: ignore

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: deterministic-playwright-e2e
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
